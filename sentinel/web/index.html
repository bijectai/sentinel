<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Guardrail Evaluator</title>
<style>
  :root {
    --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    --accent: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #080808; color: #fff; }
  select { appearance: none; -webkit-appearance: none; outline: none; cursor: pointer; }
  input { outline: none; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  @keyframes row-enter {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes banner-drop {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  @keyframes summary-rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #top-bar { flex-shrink: 0; height: 52px; display: flex; align-items: stretch; background: #0b0b0b; border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 20; overflow: hidden; }
  #bypass-banner { flex-shrink: 0; background: rgba(239,68,68,0.11); border-bottom: 2px solid rgba(239,68,68,0.45); padding: 0 20px; height: 44px; display: none; align-items: center; gap: 14px; animation: banner-drop 0.2s ease both; z-index: 15; }
  #bypass-banner.visible { display: flex; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  #content-row { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #feed-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  #feed-headers { flex-shrink: 0; display: grid; padding: 0 16px; height: 34px; align-items: center; background: #0b0b0b; border-bottom: 1px solid rgba(255,255,255,0.06); }
  #feed-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
  #progress-bar-wrap { flex-shrink: 0; height: 2px; background: rgba(255,255,255,0.05); display: none; }
  #progress-bar-wrap.visible { display: block; }
  #detail-panel { width: 390px; flex-shrink: 0; border-left: 1px solid rgba(255,255,255,0.08); overflow-y: auto; background: #0b0b0b; display: none; flex-direction: column; }
  #detail-panel.visible { display: flex; }
  #summary-panel { flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.10); background: #0d0d0d; padding: 14px 20px; animation: summary-rise 0.3s ease both; display: none; }
  #summary-panel.visible { display: block; }
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div id="top-bar">
    <!-- Brand -->
    <div id="brand" style="display:flex;align-items:center;gap:10px;padding:0 18px;border-right:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
      <img id="brand-logo" src="/public/logo.png" alt="biject" style="height:135px;width:78px;display:block;flex-shrink:0;object-fit:contain;">
      <span style="font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,0.22);letter-spacing:0.01em;">//</span>
      <span style="font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:-0.02em;color:rgba(255,255,255,0.65);">sentinel</span>
      <span style="font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:0.06em;border:1px solid rgba(255,255,255,0.11);border-radius:3px;padding:1px 5px;">v0.9.1</span>
    </div>
    <!-- Config -->
    <div id="top-config" style="flex:1;display:flex;align-items:center;gap:10px;padding:0 14px;overflow:hidden;min-width:0;">
      <button id="mode-toggle" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:0 11px;height:26px;cursor:pointer;display:flex;align-items:center;flex-shrink:0;">
        <span id="mode-label" style="font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.55);">SINGLE ▶</span>
      </button>
      <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);flex-shrink:0;"></div>
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
        <span style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">POLICY</span>
        <select id="policy-select" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:0 24px 0 8px;font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.82);height:26px;min-width:130px;max-width:180px;">
          <option value="">Loading…</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
        <span style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">AGENT</span>
        <select id="agent-select" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:0 24px 0 8px;font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.82);height:26px;min-width:130px;max-width:180px;">
          <option value="scripted">Scripted Replay</option>
          <option value="claude">Claude Sonnet 4</option>
          <option value="gpt">GPT-4o</option>
        </select>
      </div>
      <div style="width:1px;height:22px;background:rgba(255,255,255,0.08);flex-shrink:0;"></div>
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
        <span id="guardrail-url-label" style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">GUARDRAIL URL</span>
        <input id="guardrail-url" type="text" value="http://localhost:3000" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.11);border-radius:6px;padding:0 8px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.85);height:26px;width:170px;">
      </div>
      <div id="guardrail-b-wrap" style="display:none;flex-direction:column;gap:2px;flex-shrink:0;">
        <span style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">GUARDRAIL B</span>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:0 10px;height:26px;display:flex;align-items:center;font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;">Stub Adapter</div>
      </div>
    </div>
    <!-- Right controls -->
    <div style="display:flex;align-items:center;gap:14px;padding:0 16px;border-left:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">API KEY</span>
        <input id="api-key" type="password" placeholder="sk-…" autocomplete="off" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.11);border-radius:6px;padding:0 8px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.85);height:26px;width:80px;">
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.3);text-transform:uppercase;">ROUNDS</span>
        <input id="max-rounds" type="number" value="20" min="1" max="100" style="width:56px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.11);border-radius:6px;padding:0 8px;font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,0.85);text-align:center;height:26px;">
      </div>
      <button id="run-btn" style="background:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:6px;padding:0 18px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-width:68px;transition:all 0.15s ease;">
        <span id="run-btn-label" style="font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.1em;color:#1a1a1a;">RUN</span>
      </button>
      <div style="display:flex;align-items:center;gap:7px;min-width:158px;">
        <span id="status-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.22);flex-shrink:0;"></span>
        <span id="status-label" style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:rgba(255,255,255,0.55);white-space:nowrap;">IDLE</span>
      </div>
    </div>
  </div>

  <!-- Bypass Banner -->
  <div id="bypass-banner">
    <span style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:#ef4444;letter-spacing:0.08em;white-space:nowrap;">⚠ BYPASS DETECTED</span>
    <div style="width:1px;height:14px;background:rgba(239,68,68,0.35);flex-shrink:0;"></div>
    <span id="bypass-msg" style="font-family:var(--font-mono);font-size:11px;color:rgba(239,68,68,0.75);letter-spacing:0.03em;"></span>
    <span style="margin-left:auto;font-family:var(--font-mono);font-size:9px;color:rgba(239,68,68,0.45);letter-spacing:0.06em;white-space:nowrap;text-transform:uppercase;">red rows below ↓</span>
  </div>

  <!-- Main Content -->
  <div id="main">
    <div id="content-row">
      <!-- Feed -->
      <div id="feed-wrap">
        <div id="feed-headers">
          <!-- filled by JS -->
        </div>
        <div id="feed-scroll">
          <div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;pointer-events:none;">
            <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.18);text-transform:uppercase;">no active run</span>
            <span style="font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.22);">configure parameters above and press RUN</span>
          </div>
        </div>
        <div id="progress-bar-wrap">
          <div id="progress-bar" style="height:100%;width:0%;background:var(--accent);transition:width 0.5s ease;"></div>
        </div>
      </div>
      <!-- Detail Panel -->
      <div id="detail-panel">
        <div id="detail-header" style="flex-shrink:0;height:36px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;background:#0b0b0b;z-index:2;gap:8px;">
          <span id="detail-title" style="font-family:var(--font-mono);font-size:9.5px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.45);text-transform:uppercase;"></span>
          <button id="detail-close" style="margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:18px;line-height:1;padding:0 2px;display:flex;align-items:center;">×</button>
        </div>
        <div id="detail-content" style="flex:1;padding:16px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;"></div>
      </div>
    </div>
    <!-- Summary Panel -->
    <div id="summary-panel"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  mode: 'single',        // 'single' | 'comparison'
  policy: '',
  agent: 'scripted',
  guardrailUrl: 'http://localhost:3000',
  apiKey: '',
  maxRounds: 20,
  status: 'idle',        // 'idle' | 'running' | 'completed' | 'failed'
  rounds: [],
  selectedId: null,
  bypassCount: 0,
  guardrailNames: ['biject', 'stub'],
  ws: null,
};

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtParamsShort(p) {
  const s = JSON.stringify(p);
  return s.length > 72 ? s.slice(0, 69) + '…' : s;
}

function fmtParamsFull(tool, p) {
  return tool + '(\n' + JSON.stringify(p, null, 2) + '\n)';
}

function fmtLatency(us) {
  if (us == null) return null;
  return (us / 1000).toFixed(1) + ' ms';
}

function verdictFromOutcome(outcome) {
  if (outcome === 'proved')  return 'ALLOW';
  if (outcome === 'refuted') return 'DENY';
  if (outcome === 'timeout') return 'TIMEOUT';
  return 'ERROR';
}

function verdictColor(outcome) {
  if (outcome === 'proved')  return '#ef4444';
  if (outcome === 'refuted') return 'rgba(16,185,129,0.7)';
  return 'rgba(255,255,255,0.28)';
}

function badgeHTML(cls) {
  const styles = {
    BYPASSED:          'background:rgba(239,68,68,0.18);color:#ef4444;border:1px solid rgba(239,68,68,0.40)',
    INDETERMINATE:     'background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.30)',
    INFRA_GAP:         'background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.12)',
    BLOCKED_CORRECTLY: 'background:rgba(16,185,129,0.07);color:rgba(16,185,129,0.52);border:1px solid rgba(16,185,129,0.14)',
    ALLOWED_CORRECTLY: 'background:rgba(16,185,129,0.07);color:rgba(16,185,129,0.52);border:1px solid rgba(16,185,129,0.14)',
  };
  const st = styles[cls] || styles.INFRA_GAP;
  const label = cls.replace(/_/g, ' ');
  return `<span style="font-family:var(--font-mono);font-size:9.5px;font-weight:600;letter-spacing:0.07em;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;display:inline-block;${st}">${esc(label)}</span>`;
}

function feedGrid() {
  return S.mode === 'comparison' ? '48px 1fr 190px 190px 52px' : '48px 1fr 260px';
}

// ── Top-bar mode state ──────────────────────────────────────────────────────
function applyModeUI() {
  const isComp = S.mode === 'comparison';
  const toggle = document.getElementById('mode-toggle');
  const label  = document.getElementById('mode-label');
  toggle.style.background = isComp ? 'rgba(16,185,129,0.09)' : 'rgba(255,255,255,0.04)';
  toggle.style.border     = isComp ? '1px solid rgba(16,185,129,0.28)' : '1px solid rgba(255,255,255,0.10)';
  label.textContent = isComp ? 'COMPARISON ⇄' : 'SINGLE ▶';
  label.style.color = isComp ? 'var(--accent)' : 'rgba(255,255,255,0.55)';
  document.getElementById('guardrail-url-label').textContent = isComp ? 'GUARDRAIL A (URL)' : 'GUARDRAIL URL';
  const bWrap = document.getElementById('guardrail-b-wrap');
  bWrap.style.display = isComp ? 'flex' : 'none';
  renderFeedHeaders();
}

function applyRunUI() {
  const running = S.status === 'running';
  const btn      = document.getElementById('run-btn');
  const btnLabel = document.getElementById('run-btn-label');
  const dot      = document.getElementById('status-dot');
  const lbl      = document.getElementById('status-label');

  btn.style.background = running ? 'rgba(239,68,68,0.12)' : '#fff';
  btn.style.border     = running ? '1px solid rgba(239,68,68,0.42)' : '1px solid rgba(255,255,255,0.25)';
  btnLabel.textContent = running ? 'STOP' : 'RUN';
  btnLabel.style.color = running ? '#ef4444' : '#1a1a1a';

  const dotColors = { idle: 'rgba(255,255,255,0.22)', running: '#10b981', completed: '#10b981', failed: '#ef4444' };
  dot.style.background = dotColors[S.status] || dotColors.idle;
  dot.style.animation  = running ? 'pulse-dot 1.3s ease-in-out infinite' : 'none';

  const runningLabel = `RUNNING — ${S.rounds.length} / ${S.maxRounds}`;
  const statusLabels = { idle: 'IDLE', running: runningLabel, completed: 'COMPLETED', failed: 'FAILED' };
  lbl.textContent = statusLabels[S.status] || 'IDLE';

  const progress = document.getElementById('progress-bar-wrap');
  if (running || S.status === 'completed' || S.status === 'failed') {
    progress.classList.add('visible');
    const pct = S.maxRounds > 0 ? (S.rounds.length / S.maxRounds * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-bar').style.background = S.bypassCount > 0 ? 'var(--danger)' : 'var(--accent)';
  } else {
    progress.classList.remove('visible');
  }
}

// ── Feed headers ────────────────────────────────────────────────────────────
function renderFeedHeaders() {
  const isComp = S.mode === 'comparison';
  const hdr = document.getElementById('feed-headers');
  hdr.style.gridTemplateColumns = feedGrid();
  const hs = 'font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:0.12em;color:rgba(255,255,255,0.28);text-transform:uppercase;';
  if (!isComp) {
    hdr.innerHTML = `
      <span style="${hs}padding-left:4px">RND</span>
      <span style="${hs}padding-left:12px">PROPOSED ACTION</span>
      <span style="${hs}padding-left:12px">VERDICT · CLASSIFICATION</span>`;
  } else {
    const g1 = S.guardrailNames[0] || 'GUARDRAIL A';
    const g2 = S.guardrailNames[1] || 'GUARDRAIL B';
    hdr.innerHTML = `
      <span style="${hs}padding-left:4px">RND</span>
      <span style="${hs}padding-left:12px">PROPOSED ACTION</span>
      <span style="${hs}padding-left:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g1.toUpperCase())}</span>
      <span style="${hs}padding-left:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g2.toUpperCase())}</span>
      <span style="${hs}text-align:center">Δ</span>`;
  }
}

// ── Round rows ──────────────────────────────────────────────────────────────
function buildRoundRow(r) {
  const isComp    = S.mode === 'comparison';
  const isBypassed = r.c1 === 'BYPASSED' || (isComp && r.c2 === 'BYPASSED');
  const isSelected = S.selectedId === r.id;
  const bg = isBypassed
    ? (isSelected ? 'rgba(239,68,68,0.10)' : 'rgba(239,68,68,0.04)')
    : (isSelected ? 'rgba(255,255,255,0.05)' : 'transparent');
  const bl = isBypassed ? '2px solid rgba(239,68,68,0.65)' : '2px solid transparent';

  const div = document.createElement('div');
  div.className = 'round-row';
  div.dataset.id = r.id;
  div.style.cssText = `display:grid;grid-template-columns:${feedGrid()};padding:0 16px;height:44px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);border-left:${bl};background:${bg};cursor:pointer;animation:row-enter 0.22s ease both;`;
  div.addEventListener('click', () => {
    S.selectedId = S.selectedId === r.id ? null : r.id;
    refreshRowHighlights();
    renderDetail();
  });

  // Round num
  div.innerHTML += `<div style="display:flex;align-items:center;padding-left:4px;flex-shrink:0"><span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.04em">${String(r.id).padStart(2,'0')}</span></div>`;

  // Action
  div.innerHTML += `<div style="padding:0 12px;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px;overflow:hidden"><span style="font-family:var(--font-mono);font-size:12px;font-weight:500;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.tool)}()</span><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.paramsShort)}</span></div>`;

  if (!isComp) {
    const vLabel = verdictFromOutcome(r.outcome1);
    const vColor = verdictColor(r.outcome1);
    div.innerHTML += `<div style="padding:0 12px;display:flex;align-items:center;gap:9px;overflow:hidden;flex-shrink:0">${badgeHTML(r.c1)}<span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${vColor};letter-spacing:0.04em;flex-shrink:0">${vLabel}</span></div>`;
  } else {
    div.innerHTML += `<div style="padding:0 12px;display:flex;align-items:center;overflow:hidden;flex-shrink:0">${badgeHTML(r.c1)}</div>`;
    div.innerHTML += `<div style="padding:0 12px;display:flex;align-items:center;overflow:hidden;flex-shrink:0">${r.c2 ? badgeHTML(r.c2) : ''}</div>`;
    const deltaHTML = r.disagreement
      ? `<span style="font-family:var(--font-mono);font-size:9px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.28);border-radius:3px;padding:1px 5px;letter-spacing:0.06em;white-space:nowrap">≠</span>`
      : '';
    div.innerHTML += `<div style="display:flex;align-items:center;justify-content:center;flex-shrink:0">${deltaHTML}</div>`;
  }

  return div;
}

function appendRoundToFeed(r) {
  const feed = document.getElementById('feed-scroll');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  removeRunningIndicator();
  feed.appendChild(buildRoundRow(r));
  if (S.status === 'running') feed.appendChild(buildRunningIndicator());
  feed.scrollTop = feed.scrollHeight;
}

function buildRunningIndicator() {
  const div = document.createElement('div');
  div.id = 'running-indicator';
  div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 20px;border-top:1px solid rgba(255,255,255,0.04)';
  div.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse-dot 1.2s ease-in-out infinite"></span><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.06em">probing round ${S.rounds.length + 1}…</span><span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.2)">${S.rounds.length} / ${S.maxRounds}</span>`;
  return div;
}

function removeRunningIndicator() {
  const ri = document.getElementById('running-indicator');
  if (ri) ri.remove();
}

function refreshRowHighlights() {
  document.querySelectorAll('.round-row').forEach(row => {
    const id = parseInt(row.dataset.id);
    const r = S.rounds.find(x => x.id === id);
    if (!r) return;
    const isComp    = S.mode === 'comparison';
    const isBypassed = r.c1 === 'BYPASSED' || (isComp && r.c2 === 'BYPASSED');
    const isSelected = S.selectedId === id;
    row.style.background = isBypassed
      ? (isSelected ? 'rgba(239,68,68,0.10)' : 'rgba(239,68,68,0.04)')
      : (isSelected ? 'rgba(255,255,255,0.05)' : 'transparent');
  });
}

// ── Detail panel ────────────────────────────────────────────────────────────
function renderDetail() {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  if (S.selectedId === null) {
    panel.classList.remove('visible');
    return;
  }
  const r = S.rounds.find(x => x.id === S.selectedId);
  if (!r) { panel.classList.remove('visible'); return; }

  panel.classList.add('visible');
  document.getElementById('detail-title').textContent = `ROUND ${String(r.id).padStart(2,'0')} — DETAIL`;

  const isComp = S.mode === 'comparison';
  let html = '';

  // Badges
  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${badgeHTML(r.c1)}`;
  if (isComp && r.c2) {
    html += `<span style="font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.2)">vs</span>${badgeHTML(r.c2)}`;
    if (r.disagreement) {
      html += `<span style="font-family:var(--font-mono);font-size:9px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.28);border-radius:3px;padding:2px 7px;letter-spacing:0.07em;text-transform:uppercase">DISAGREEMENT</span>`;
    }
  }
  html += `</div>`;

  // Proposed action
  html += `<div>
    <div style="font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:0.14em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:8px">PROPOSED ACTION</div>
    <pre style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:11px 13px;font-family:var(--font-mono);font-size:11.5px;color:rgba(255,255,255,0.8);white-space:pre-wrap;word-break:break-all;line-height:1.65">${esc(fmtParamsFull(r.tool, r.params))}</pre>
  </div>`;

  // Guardrail 1
  html += guardrailDetailHTML(isComp ? (S.guardrailNames[0] || 'Biject') : 'Guardrail', r.outcome1, r.lat1, r.reject1);

  // Guardrail 2 (compare)
  if (isComp && r.c2) {
    html += guardrailDetailHTML(S.guardrailNames[1] || 'Stub', r.outcome2, r.lat2, r.reject2);
  }

  // Timestamp
  html += `<div style="padding-top:4px;border-top:1px solid rgba(255,255,255,0.06)"><span style="font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:0.04em">${esc(r.ts)}</span></div>`;

  content.innerHTML = html;
}

function guardrailDetailHTML(name, outcome, lat, rejectCode) {
  const vLabel = verdictFromOutcome(outcome);
  const vColor = verdictColor(outcome);
  let rows = `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3)">verdict</span><span style="font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.04em;color:${vColor}">${vLabel}</span></div>`;
  if (lat) {
    rows += `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3)">latency</span><span style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.55)">${esc(lat)}</span></div>`;
  }
  if (rejectCode) {
    rows += `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3)">reject code</span><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.48);background:rgba(255,255,255,0.04);border-radius:4px;padding:1px 6px">${esc(rejectCode)}</span></div>`;
  }
  return `<div>
    <div style="font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:0.14em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:8px">${esc(name.toUpperCase())}</div>
    <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:11px 13px;display:flex;flex-direction:column;gap:7px">${rows}</div>
  </div>`;
}

// ── Summary panel ───────────────────────────────────────────────────────────
function renderSummary() {
  const panel = document.getElementById('summary-panel');
  const isComp = S.mode === 'comparison';
  const rounds = S.rounds;

  if (S.status !== 'completed' && S.status !== 'failed') {
    panel.classList.remove('visible');
    return;
  }

  const bypassCount  = S.bypassCount;
  const indCount     = rounds.filter(r => r.c1 === 'INDETERMINATE' || (isComp && r.c2 === 'INDETERMINATE')).length;
  const infraCount   = rounds.filter(r => r.c1 === 'INFRA_GAP'     || (isComp && r.c2 === 'INFRA_GAP')).length;
  const corrCount    = rounds.filter(r => {
    const ok1 = r.c1 === 'BLOCKED_CORRECTLY' || r.c1 === 'ALLOWED_CORRECTLY';
    const ok2 = isComp && (r.c2 === 'BLOCKED_CORRECTLY' || r.c2 === 'ALLOWED_CORRECTLY');
    return ok1 || ok2;
  }).length;
  const disagreeCount = rounds.filter(r => r.disagreement).length;
  const runFailed = bypassCount > 0;

  const statBase = 'display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:6px;min-width:68px;';
  const numBase  = 'font-family:var(--font-mono);font-size:17px;font-weight:700;';
  const lblBase  = 'font-family:var(--font-mono);font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;';

  const stat = (num, label, color) =>
    `<div style="${statBase}"><span style="${numBase}color:${color}">${num}</span><span style="${lblBase}">${label}</span></div>`;

  const bypassStat = `<div style="${statBase}background:${bypassCount>0?'rgba(239,68,68,0.07)':'rgba(255,255,255,0.03)'};border:${bypassCount>0?'1px solid rgba(239,68,68,0.22)':'1px solid rgba(255,255,255,0.07)'}"><span style="${numBase}color:${bypassCount>0?'#ef4444':'rgba(255,255,255,0.3)'}">${bypassCount}</span><span style="${lblBase}">bypassed</span></div>`;

  const verdictStyle = runFailed
    ? 'background:rgba(239,68,68,0.14);color:#ef4444;border:1px solid rgba(239,68,68,0.32)'
    : 'background:rgba(16,185,129,0.10);color:var(--accent);border:1px solid rgba(16,185,129,0.25)';
  const verdictText = runFailed ? `FAIL — ${bypassCount} bypass${bypassCount>1?'es':''}` : 'PASS';

  panel.innerHTML = `<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span style="font-family:var(--font-display);font-size:13px;font-weight:500;color:rgba(255,255,255,0.45);letter-spacing:-0.01em">run complete</span>
      <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.1em;padding:3px 10px;border-radius:5px;text-transform:uppercase;${verdictStyle}">${verdictText}</span>
    </div>
    <div style="width:1px;height:28px;background:rgba(255,255,255,0.08);flex-shrink:0"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:1;min-width:0">
      ${stat(rounds.length, 'rounds', 'rgba(255,255,255,0.8)')}
      ${bypassStat}
      ${stat(indCount, 'indeterminate', indCount>0?'#f59e0b':'rgba(255,255,255,0.3)')}
      ${stat(infraCount, 'infra_gap', 'rgba(255,255,255,0.3)')}
      ${stat(corrCount, 'correct', 'rgba(16,185,129,0.65)')}
      ${isComp ? stat(disagreeCount, 'disagree', disagreeCount>0?'#f59e0b':'rgba(255,255,255,0.3)') : ''}
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button id="copy-report-btn" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:6px;padding:0 14px;height:30px;font-family:var(--font-mono);font-size:9.5px;font-weight:600;letter-spacing:0.08em;color:rgba(255,255,255,0.6);cursor:pointer;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center">COPY REPORT</button>
      <button id="new-run-btn" style="background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.28);border-radius:6px;padding:0 14px;height:30px;font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:0.08em;color:var(--accent);cursor:pointer;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center">NEW RUN</button>
    </div>
  </div>`;

  panel.classList.add('visible');

  document.getElementById('copy-report-btn').addEventListener('click', () => {
    const report = {
      tool: 'sentinel', version: '0.9.1',
      run: { policy: S.policy, agent: S.agent, mode: S.mode, rounds: rounds.length },
      results: { bypassed: bypassCount, indeterminate: indCount, infra_gap: infraCount, correct: corrCount, disagreements: isComp ? disagreeCount : null },
      verdict: runFailed ? 'FAIL' : 'PASS',
      timestamp: new Date().toISOString(),
    };
    navigator.clipboard.writeText(JSON.stringify(report, null, 2)).catch(() => {});
  });

  document.getElementById('new-run-btn').addEventListener('click', resetRun);
}

// ── Run lifecycle ────────────────────────────────────────────────────────────
function resetRun() {
  if (S.ws) { S.ws.close(); S.ws = null; }
  S.rounds = []; S.selectedId = null; S.status = 'idle'; S.bypassCount = 0;
  const feed = document.getElementById('feed-scroll');
  feed.innerHTML = `<div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;pointer-events:none"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.18);text-transform:uppercase">no active run</span><span style="font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.22)">configure parameters above and press RUN</span></div>`;
  document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('bypass-banner').classList.remove('visible');
  document.getElementById('summary-panel').classList.remove('visible');
  applyRunUI();
}

async function startRun() {
  S.policy = document.getElementById('policy-select').value;
  S.agent  = document.getElementById('agent-select').value;
  S.guardrailUrl = document.getElementById('guardrail-url').value.trim();
  S.apiKey = document.getElementById('api-key').value.trim();
  S.maxRounds = Math.max(1, Math.min(100, parseInt(document.getElementById('max-rounds').value) || 20));

  if (!S.policy) { alert('Select a policy first.'); return; }

  resetRun();
  S.status = 'running';
  applyRunUI();

  const body = {
    policy_id: S.policy,
    agent: S.agent,
    mode: S.mode === 'comparison' ? 'compare' : 'single',
    max_rounds: S.maxRounds,
    guardrail_base_url: S.guardrailUrl,
  };
  if (S.apiKey) body.api_key = S.apiKey;

  try {
    const res = await fetch('/api/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || res.statusText);
    }
    const { run_id } = await res.json();
    connectWs(run_id);
  } catch (e) {
    alert('Failed to start run: ' + e.message);
    S.status = 'idle';
    applyRunUI();
  }
}

function stopRun() {
  if (S.ws) { S.ws.close(); S.ws = null; }
  S.status = S.rounds.length > 0 ? 'completed' : 'idle';
  removeRunningIndicator();
  applyRunUI();
  renderSummary();
}

function connectWs(runId) {
  const ws = new WebSocket(`ws://${location.host}/ws/runs/${runId}`);
  S.ws = ws;

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }

    if (msg.type === 'round') {
      const d = msg.data;
      const r = {
        id: d.round_number,
        tool: d.proposed_action.tool_name,
        params: d.proposed_action.params,
        paramsShort: fmtParamsShort(d.proposed_action.params),
        c1: d.classification,
        outcome1: d.verdict.outcome,
        lat1: fmtLatency(d.verdict.latency_us),
        reject1: d.verdict.reject_code || null,
        c2: null, outcome2: null, lat2: null, reject2: null,
        disagreement: false,
        ts: new Date().toISOString().replace('T', ' ').slice(0, 23) + ' UTC',
      };
      if (r.c1 === 'BYPASSED') {
        S.bypassCount++;
        updateBypassBanner();
        document.getElementById('progress-bar').style.background = 'var(--danger)';
      }
      S.rounds.push(r);
      appendRoundToFeed(r);
      updateStatusLabel();
      updateProgress();

    } else if (msg.type === 'round_compare') {
      const d = msg.data;
      const names = Object.keys(d.results);
      if (names.length >= 2) S.guardrailNames = names;
      const g1 = d.results[names[0]];
      const g2 = names[1] ? d.results[names[1]] : null;
      if (!g1) return;
      const r = {
        id: d.round_number,
        tool: g1.proposed_action.tool_name,
        params: g1.proposed_action.params,
        paramsShort: fmtParamsShort(g1.proposed_action.params),
        c1: g1.classification,
        outcome1: g1.verdict.outcome,
        lat1: fmtLatency(g1.verdict.latency_us),
        reject1: g1.verdict.reject_code || null,
        c2: g2 ? g2.classification : null,
        outcome2: g2 ? g2.verdict.outcome : null,
        lat2: g2 ? fmtLatency(g2.verdict.latency_us) : null,
        reject2: g2 ? (g2.verdict.reject_code || null) : null,
        disagreement: d.is_disagreement,
        ts: new Date().toISOString().replace('T', ' ').slice(0, 23) + ' UTC',
      };
      if (r.c1 === 'BYPASSED' || r.c2 === 'BYPASSED') {
        S.bypassCount++;
        updateBypassBanner();
        document.getElementById('progress-bar').style.background = 'var(--danger)';
      }
      S.rounds.push(r);
      appendRoundToFeed(r);
      updateStatusLabel();
      updateProgress();

    } else if (msg.type === 'complete') {
      S.status = msg.data.status === 'failed' ? 'failed' : 'completed';
      S.ws = null;
      removeRunningIndicator();
      applyRunUI();
      renderSummary();
    } else if (msg.type === 'error') {
      console.error('Run error:', msg.data);
    }
  };

  ws.onerror = () => {
    S.status = 'failed';
    S.ws = null;
    removeRunningIndicator();
    applyRunUI();
    renderSummary();
  };
}

function updateBypassBanner() {
  const banner = document.getElementById('bypass-banner');
  banner.classList.add('visible');
  document.getElementById('bypass-msg').textContent =
    `${S.bypassCount} round(s) passed the guardrail unblocked — policy enforcement failed`;
}

function updateStatusLabel() {
  document.getElementById('status-label').textContent = `RUNNING — ${S.rounds.length} / ${S.maxRounds}`;
}

function updateProgress() {
  const pct = S.maxRounds > 0 ? (S.rounds.length / S.maxRounds * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-bar-wrap').classList.add('visible');
}

// ── Policy loading ───────────────────────────────────────────────────────────
async function loadPolicies() {
  try {
    const res = await fetch('/api/policies');
    if (!res.ok) return;
    const policies = await res.json();
    const sel = document.getElementById('policy-select');
    sel.innerHTML = policies.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
    if (policies.length > 0) S.policy = policies[0];
  } catch (e) {
    console.error('Failed to load policies:', e);
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('brand-logo').onerror = function() { this.style.display = 'none'; };

document.getElementById('mode-toggle').addEventListener('click', () => {
  if (S.status === 'running') stopRun();
  S.mode = S.mode === 'single' ? 'comparison' : 'single';
  resetRun();
  applyModeUI();
});

document.getElementById('run-btn').addEventListener('click', () => {
  if (S.status === 'running') stopRun(); else startRun();
});

document.getElementById('detail-close').addEventListener('click', () => {
  S.selectedId = null;
  refreshRowHighlights();
  renderDetail();
});

renderFeedHeaders();
loadPolicies();
</script>
